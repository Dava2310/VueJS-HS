name: 'CI workflow'

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Format and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Check Format
        run: pnpm run format

      - name: Run tests
        run: pnpm run test

  end-2-end-testing:
    name: Playwright Tests
    needs: ci
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for API
        run: |
          echo "Waiting for API to be available..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-hs-2026.onrender.com/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "API is up."
              exit 0
            fi
            echo "Attempt $i: API not ready (HTTP $STATUS), retrying in 15s..."
            sleep 15
          done
          echo "API did not become available in time."
          exit 1

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
